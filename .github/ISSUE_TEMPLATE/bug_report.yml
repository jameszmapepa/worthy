name: Bug report
description: Something in worthy did not work as expected
labels: ["bug"]
body:
  - type: input
    id: repo
    attributes:
      label: Repository you ran worthy against
      placeholder: owner/repo
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the terminal output or attach a screenshot.
      render: text
  - type: input
    id: version
    attributes:
      label: worthy version
      placeholder: worthy 0.1.0 (or a commit SHA)
  - type: input
    id: env
    attributes:
      label: OS and terminal
      placeholder: macOS 14 / iTerm2
