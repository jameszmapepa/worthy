name: demo

# Manual: renders the TUI demo GIF from demo.tape and opens a PR with it.
# main is protected, so the bot opens a PR instead of pushing directly.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install worthy
        run: |
          go install ./cmd/worthy
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # charmbracelet/vhs-action is unmaintained (latest v2.1.0, 2024) and its
      # bundled ffmpeg provisioning fails on current runners, so install the VHS
      # toolchain directly: ffmpeg + ttyd (VHS's terminal) + vhs itself.
      - name: Install VHS toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -fsSL -o /usr/local/bin/ttyd \
            https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
          sudo chmod +x /usr/local/bin/ttyd
          go install github.com/charmbracelet/vhs@v0.11.0

      # The token lifts the API rate limit to 5,000/hr so the recorded run does
      # not flake on the unauthenticated 60/hr cap.
      - name: Render demo
        run: vhs demo.tape
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open a PR with the demo recording
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: demo.gif
          branch: chore/update-demo
          delete-branch: true
          commit-message: Update the demo recording
          title: Update the demo recording
          body: Regenerated `demo.gif` from `demo.tape` via the demo workflow.
