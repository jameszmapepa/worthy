name: changelog-guard

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    # Skip for Dependabot (it never writes a changelog entry); for other PRs that
    # need no entry, apply the 'skip-changelog' label. Keyed on the PR author,
    # not github.actor: "Update branch" makes the clicker the actor, which would
    # defeat the exemption.
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require a CHANGELOG entry
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          if git diff --quiet "origin/$BASE_REF" -- CHANGELOG.md; then
            echo "::error::CHANGELOG.md was not updated. Add an entry under '## [Unreleased]', or apply the 'skip-changelog' label."
            exit 1
          fi
          echo "CHANGELOG.md updated — OK."
