name: tag-release

# workflow_call, not the tag-push trigger: tags pushed with GITHUB_TOKEN
# never trigger other workflows.
on:
  push:
    branches: [main]
    paths: [CHANGELOG.md]

permissions:
  contents: write

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.tag.outputs.created }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Read topmost released version from CHANGELOG
        id: version
        run: |
          version="$(grep -m1 -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.+-]+)?\]' CHANGELOG.md | sed -E 's/^## \[(.+)\]$/\1/')"
          if [ -z "$version" ]; then
            echo "::error::No released version heading found in CHANGELOG.md."
            exit 1
          fi
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Topmost released version: ${version}"

      - name: Create the tag unless it already exists
        id: tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists - nothing to release."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
