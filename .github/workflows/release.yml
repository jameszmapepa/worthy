name: release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: Existing v-prefixed tag to release (e.g. v0.2.0)
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # Required reviewer on the 'release' environment gates this job.
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # Pull the section for this tag out of CHANGELOG.md so the GitHub Release
      # notes match the curated changelog rather than raw commit logs.
      - name: Extract release notes
        run: |
          version="${TAG#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            /^## \[/ && flag { exit }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Notes for ${version}:"; cat RELEASE_NOTES.md

      # Delete any existing release for this tag so GoReleaser creates a fresh
      # one; avoids the 422 already_exists error when a release was published
      # for this tag before (e.g. after the tag is moved).
      - name: Remove any existing release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "$TAG" --yes 2>/dev/null || true

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicit: the workflow_call path isn't triggered by the tag ref.
          GORELEASER_CURRENT_TAG: ${{ inputs.tag || github.ref_name }}

      # GoReleaser's --release-notes does not reliably populate the release body,
      # so set it explicitly to guarantee the notes are never empty.
      - name: Set release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$TAG" --notes-file RELEASE_NOTES.md
