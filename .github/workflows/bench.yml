name: bench

# Latency-regression gate. GitHub's shared runners are noisy, so absolute
# ns/op is meaningless across runs; the only sound comparison is base-vs-head
# on the SAME runner in one job. benchstat reports a percentage only when a
# change is statistically significant (count=8, default alpha), and
# scripts/benchgate.awk fails the job when a significant sec/op regression
# exceeds THRESHOLD. Allocation regressions are gated separately and
# deterministically by the strict tests run in ci.yml.
#
# Note: base and head are both built with the toolchain resolved from the head
# go.mod, so this compares code, not toolchain versions. BenchmarkCollect is
# I/O-bound (loopback HTTP) and too noisy to gate, so it is EXCLUDED from the
# gate (EXCLUDE) while still shown in the comparison table.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # post the comparison as a sticky comment

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

env:
  COUNT: 8
  # Conservative on purpose: tune down once observed runner noise is known.
  THRESHOLD: 25
  EXCLUDE: Collect

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need both base and head commits

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260615155930-9e4b9ddef5b6

      - name: Benchmark base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git checkout --quiet --force "$BASE_SHA"
          go mod download
          go test -run='^$' -bench=. -benchmem -count=${COUNT} ./... | tee base.txt

      - name: Benchmark head
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git checkout --quiet --force "$HEAD_SHA"
          go mod download
          go test -run='^$' -bench=. -benchmem -count=${COUNT} ./... | tee head.txt

      - name: Compare (base vs head)
        run: |
          benchstat base.txt head.txt | tee compare.txt
          benchstat -format csv base.txt head.txt > compare.csv
          {
            echo '### Benchmark comparison — base vs head, same runner'
            echo
            echo "Gate: fail on a significant sec/op regression > ${THRESHOLD}% (excluding /${EXCLUDE}/, which is I/O-bound)."
            echo
            echo '```'
            cat compare.txt
            echo '```'
          } > comment.md

      # continue-on-error so a comment failure (e.g. token scope on a fork) can
      # never let the gate step be skipped via its implicit success() condition.
      - name: Post comparison comment
        if: always()
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: bench
          path: comment.md

      - name: Gate on significant latency regression
        run: awk -v threshold=${THRESHOLD} -v exclude=${EXCLUDE} -f scripts/benchgate.awk compare.csv
